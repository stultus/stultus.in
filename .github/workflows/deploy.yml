name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [feeds-updated]

concurrency:
  group: deploy
  cancel-in-progress: false

# Opt JavaScript-action runtimes (peaceiris/actions-hugo,
# peaceiris/actions-gh-pages) into Node.js 24. GitHub will force this on
# 2026-06-02; until then the env var avoids the deprecation warning and
# surfaces any breakage now rather than at the cutoff.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.1'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Publish to stultus.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: stultus/stultus.github.io
          publish_branch: master
          publish_dir: ./public
