baseurl = "https://stultus.in/"
title = "Hrishikesh Bhaskaran"
theme = "stupidly-minimal"
languagecode = "en"
defaultcontentlanguage = "en"

paginate = 20
canonifyurls = true
enableRobotsTXT = true

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noClasses = false
style = "monokai"

[params]
    author = "Hrishikesh Bhaskaran"
    tagline = "Developer / Flâneur / Storyteller"
    info = "Vice President of Engineering at [Entri](https://entri.app). Building things, telling stories, wandering through ideas. Interested in FOSS, language computing, privacy, and the places where technology meets culture."
    description = "Hrishikesh Bhaskaran (stultus) — Vice President of Engineering at Entri. Developer, FOSS contributor, screenwriter, and flâneur from Kerala, India."
    keywords = "Hrishikesh Bhaskaran, Hrishikesh, Hrishi, stultus, Entri, developer, VP Engineering, FOSS, Malayalam computing, Kerala, screenwriter, Neelavelicham, digital privacy, SMC"
    avatarurl = "img/hrishikesh_bhaskaran.jpg"
    ogImage = "img/hrishikesh_bhaskaran-bnw.png"
    logourl = "img/logo.png"
    email = "hrishi.kb@gmail.com"
    twitter = "_stultus"
    alternateNames = "stultus,Hrishi,Hrishikesh"

    footercontent = "'It is our choices ... that show what we truly are, far more than our abilities' — Albus Dumbledore"

    hidecredits = false
    hidecopyright = false
    rtl = false
    custom_css = ["css/custom.css"]

# Remote feed sources (consumed by layouts/partials/data/feeds.html)
[params.feeds]
    movies = "https://raw.githubusercontent.com/stultus/hrishi-feeds/main/data/movies.json"
    books  = "https://raw.githubusercontent.com/stultus/hrishi-feeds/main/data/books.json"

# Cache resources.GetRemote responses for 24h
[caches]
    [caches.getresource]
        maxAge = "24h"

# Menu links
[[menu.main]]
    name = "blog"
    weight = 1
    url  = "/post/"
[[menu.main]]
    name = "projects"
    weight = 2
    url = "/projects/"
[[menu.main]]
    name = "now"
    weight = 3
    url = "/now/"
[[menu.main]]
    name = "about"
    weight = 4
    url = "/about/"
[[menu.main]]
    name = "notes"
    weight = 5
    url = "/notes/"
